- name: app setup
  include_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  include_role:
    name: common
    tasks_from: nodejs

- name: copy mongo repo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb clinet
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: check products loaded or not
  ansible.builtin.command: mongosh --host mongodb.kakuturu.online --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: print catalogue output
  ansible.builtin.debug:
    msg: "{{ catalogue_output }}"

- name: load products
  tags:
  - import
  ansible.builtin.shell: mongosh --host mongodb.kakuturu.online < /app/db/master-data.js
  when: catalogue_output.stdout | int < 0 #if stdout value is greater than 0 then data is already loaded.

- name: systemd setup
  tags:
  - import
  include_role:
    name: common
    tasks_from: systemd.yaml