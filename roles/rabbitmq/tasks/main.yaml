- name: Configuring rabbitmq
  hosts: rabbitmq
  become: yes
  tasks:
  - name: Copying rabbitmq repo
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: Installing rabbitmq server
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: installed

  - name: Enable and start rabbitmq
    ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: yes

  - name: create roboshop user for rabbitmq and give all privileges
    community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present